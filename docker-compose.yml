services:
  postgres:
    image: postgres:16
    container_name: delivery_postgres
    environment:
      POSTGRES_DB: delivery_tracking_db
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
    ports:
      - "5432:5432"
    volumes:
      - delivery_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: delivery_redis
    ports:
      - "6379:6379"

volumes:
  delivery_postgres_data: